services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airquality
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airquality"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/airquality?schema=public
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000/ws
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  db_data:
